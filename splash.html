<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SaudiWay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      background:#0d2b18;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }

    /* Background texture */
    .bg-pattern{
      position:absolute;
      inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(31,95,44,0.6) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(42,106,63,0.4) 0%, transparent 60%);
    }

    /* Geometric ornament top */
    .ornament{
      position:absolute;
      top:-60px;
      left:50%;
      transform:translateX(-50%);
      width:340px;
      height:340px;
      border:1px solid rgba(255,255,255,0.07);
      border-radius:50%;
    }
    .ornament::before{
      content:'';
      position:absolute;
      inset:20px;
      border:1px solid rgba(255,255,255,0.05);
      border-radius:50%;
    }

    /* Content */
    .content{
      position:relative;
      z-index:2;
      text-align:center;
      animation:fadeUp 1s ease both;
    }

    /* Logo mark */
    .logo-mark{
      width:80px;
      height:80px;
      background:linear-gradient(135deg,#2a6a3f,#3a8f56);
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 28px;
      box-shadow:0 20px 50px rgba(42,106,63,0.5);
    }
    .logo-mark svg{width:40px;height:40px;fill:none;stroke:#fff;stroke-width:1.8}

    .tag{
      font-size:11px;
      letter-spacing:3px;
      color:rgba(255,255,255,0.5);
      margin-bottom:16px;
      text-transform:uppercase;
    }

    h1{
      font-size:52px;
      font-weight:700;
      color:#fff;
      letter-spacing:-1px;
      line-height:1;
      margin-bottom:8px;
    }
    h1 span{color:#5db87a}

    .subtitle{
      font-size:15px;
      color:rgba(255,255,255,0.5);
      margin-bottom:56px;
      letter-spacing:0.5px;
    }

    /* Buttons */
    .btn-group{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
    }

    .btn-primary{
      background:linear-gradient(135deg,#2a6a3f,#3a8f56);
      color:#fff;
      border:none;
      padding:16px 56px;
      border-radius:16px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      transition:all 0.2s ease;
      box-shadow:0 8px 24px rgba(42,106,63,0.4);
      letter-spacing:0.3px;
    }
    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 32px rgba(42,106,63,0.5);
    }

    .btn-ghost{
      background:rgba(255,255,255,0.07);
      color:rgba(255,255,255,0.75);
      border:1px solid rgba(255,255,255,0.12);
      padding:14px 56px;
      border-radius:16px;
      font-size:15px;
      font-weight:500;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      transition:all 0.2s ease;
    }
    .btn-ghost:hover{
      background:rgba(255,255,255,0.12);
    }

    /* Bottom strip */
    .bottom-strip{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      height:200px;
      background:linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-bottom:28px;
    }
    .bottom-strip p{
      font-size:12px;
      color:rgba(255,255,255,0.3);
      letter-spacing:0.5px;
    }

    /* Decorative circles */
    .circle{
      position:absolute;
      border:1px solid rgba(255,255,255,0.04);
      border-radius:50%;
      pointer-events:none;
    }
    .c1{width:500px;height:500px;bottom:-200px;left:-150px}
    .c2{width:300px;height:300px;top:80px;right:-80px}
    .c3{width:160px;height:160px;bottom:100px;right:60px}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(30px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* Loading bar */
    .loader{
      position:fixed;
      bottom:0;left:0;right:0;
      height:3px;
      background:rgba(255,255,255,0.1);
    }
    .loader-fill{
      height:100%;
      background:linear-gradient(90deg,#2a6a3f,#5db87a);
      width:0%;
      transition:width 2.5s ease;
    }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>
  <div class="ornament"></div>

  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>

  <div class="content">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>
    <p class="tag">The Oasis Perspective</p>
    <h1>Saudi<span>Way</span></h1>
    <p class="subtitle">Discover Riyadh like never before</p>

    <div class="btn-group">
      <a href="login.html" class="btn-primary">Begin Your Journey</a>
      <a href="home.html" class="btn-ghost">Explore as Guest</a>
    </div>
  </div>

  <div class="bottom-strip">
    <p>© 2026 SaudiWay. All rights reserved.</p>
  </div>

  <div class="loader"><div class="loader-fill" id="lf"></div></div>

  <script>
    // Animate loader bar
    requestAnimationFrame(() => {
      document.getElementById('lf').style.width = '100%';
    });
  </script>
</body>
</html>
