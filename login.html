<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SaudiWay - Login</title>

  <link rel="stylesheet" href="login.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- FONT (closer to design) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>


<body>

<div class="page">

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- LOGIN CARD -->
  <div class="card fade-up">

    <p class="tag">BEGIN YOUR JOURNEY</p>
    <h1>Login to your Majlis</h1>
    <form action= "connect.php" method="post">
    <!-- EMAIL -->
    <label>Email Address</label>
    <div class="input focus-effect">
      <i data-lucide="mail"></i>
      <input type="text" placeholder="name@example.com">
    </div>

    <!-- PASSWORD -->
    <div class="row">
      <label>Password</label>
      <a href="#">Forgot Password?</a>
    </div>

    <div class="input focus-effect">
      <i data-lucide="lock"></i>
      <input type="password" placeholder="••••••••">
    </div>

    <!-- BUTTON -->
    <button class="btn-primary ripple">Continue to Explorer Profile</button>

    <!-- DIVIDER -->
    <div class="divider">
      <span>OR SIGN IN WITH</span>
    </div>

    <!-- SOCIAL -->
    <div class="socials">
      <button class="social hover-lift">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
        Google
      </button>

<button class="social hover-lift">
  <svg class="icon" viewBox="0 0 24 24">
    <path fill="black" d="M16.365 1.43c0 1.14-.465 2.2-1.235 2.97-.8.8-2.07 1.41-3.19 1.32-.14-1.09.4-2.22 1.16-3 .8-.84 2.16-1.44 3.27-1.29zm3.46 15.26c-.17.39-.36.75-.57 1.1-.29.49-.64.93-1.04 1.33-.53.53-1.1.96-1.72.96-.62 0-.82-.4-1.6-.4-.79 0-1.03.4-1.62.4-.59 0-1.2-.47-1.73-.98-1.5-1.5-2.64-4.22-2.64-6.57 0-2.37 1.3-3.64 2.57-3.64.66 0 1.21.43 1.62.43.39 0 1.06-.46 1.85-.46.33 0 1.52.03 2.24 1.08-.06.03-1.33.77-1.32 2.3.01 1.84 1.61 2.46 1.63 2.47z"/>
  </svg>
  Apple
</button>
    </div>

    <!-- FOOT TEXT -->
    <p class="bottom">
      New to the trail?
      <span>Start your adventure here</span>
    </p>

  </div>

  <!-- FOOTER -->
<footer>
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank" aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>
      <a href="https://instagram.com" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://twitter.com" target="_blank" aria-label="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
    </div>
    <p>©️ 2026 SaudiWay. All rights reserved.</p>
  </footer>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
