<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SaudiWay - Login</title>

  <link rel="stylesheet" href="login.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- FONT (closer to design) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>


<body>

<div class="page">

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- LOGIN CARD -->
  <div class="card fade-up">

    <p class="tag">BEGIN YOUR JOURNEY</p>
    <h1>Login to your Majlis</h1>
    <form action= "connect.php" method="post">
    <!-- EMAIL -->
    <label>Email Address</label>
    <div class="input focus-effect">
      <i data-lucide="mail"></i>
      <input type="text" placeholder="name@example.com">
    </div>

    <!-- PASSWORD -->
    <div class="row">
      <label>Password</label>
      <a href="#">Forgot Password?</a>
    </div>

    <div class="input focus-effect">
      <i data-lucide="lock"></i>
      <input type="password" placeholder="••••••••">
    </div>

    <!-- BUTTON -->
    <button class="btn-primary ripple">Continue to Explorer Profile</button>

    <!-- DIVIDER -->
    <div class="divider">
      <a href="register.html">
      <span>OR SIGN IN WITH</span>
    </div>

   
   

    <!-- FOOT TEXT -->
    <p class="bottom">
      New to the trail?
      <span> SIGN IN </span>
    </p>

  </div>

  <!-- FOOTER -->
<footer>
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank" aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>
      <a href="https://instagram.com" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://twitter.com" target="_blank" aria-label="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
    </div>
    <p>©️ 2026 SaudiWay. All rights reserved.</p>
  </footer>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
